services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dx-api
      - dx-web
    restart: unless-stopped

  dx-api:
    build:
      context: ../dx-api
      dockerfile: Dockerfile.dev
    volumes:
      - ../dx-api:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    env_file:
      - ./env/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dx-web:
    build:
      context: ../dx-web
      dockerfile: Dockerfile.dev
    volumes:
      - ../dx-web:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./env/.env.dev
    depends_on:
      - dx-api
    restart: unless-stopped

  postgres:
    build: ./postgres
    command: postgres -c shared_preload_libraries=pg_partman_bgw
    ports:
      - "5432:5432"
    env_file:
      - ./env/.env.dev
    volumes:
      - pgdata:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  go-mod-cache:
  go-build-cache:
